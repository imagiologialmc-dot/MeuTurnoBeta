<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MeuTurno BETA v2.0</title>
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2AA8A8">
  <style>
    :root { --primary: #2AA8A8; --secondary: #2D6E8E; --bg: #f0f4f7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: #333; }
    .hidden { display: none !important; }
    
    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
    .login-box { background: white; border-radius: 16px; padding: 25px; width: 100%; max-width: 350px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
    .login-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1.5px solid #ddd; outline: none; }
    .btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; }

    /* HEADER */
    .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 12px; border-radius: 15px; font-size: 11px; }

    /* CONTEÚDO TABS */
    .tab-content { padding: 12px; padding-bottom: 90px; }
    .section-title { font-size: 18px; font-weight: 700; color: var(--secondary); margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; }

    /* CARDS */
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid var(--primary); }
    .aviso-texto { font-size: 14px; line-height: 1.5; white-space: pre-wrap; margin: 8px 0; }
    
    /* VISUALIZADOR PDF */
    .viewer-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .viewer-actions { display: flex; background: #f8f9fa; border-bottom: 1px solid #eee; }
    .btn-action { flex: 1; padding: 10px; text-align: center; text-decoration: none; color: var(--secondary); font-size: 10px; font-weight: 700; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 4px; }
    iframe { width: 100%; height: calc(100svh - 260px); min-height: 400px; border: none; display: block; background: #fff; }

    /* FORMULÁRIO TROCAS */
    .form-label { font-size: 12px; font-weight: 700; color: var(--secondary); margin-top: 10px; display: block; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }

    /* NAVEGAÇÃOScrollable */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e0e0e0; z-index: 100; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .nav-btn { flex: 1; min-width: 65px; padding: 8px 2px; border: none; background: none; color: #999; font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .nav-btn.active { color: var(--primary); font-weight: 700; }
    .nav-btn .icon { font-size: 20px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div style="font-size: 60px; margin-bottom:10px;">☢️</div>
  <h1 style="color:white; font-size:24px;">MeuTurno v2.0 BETA</h1>
  <div class="login-box">
    <input type="text" id="login-email" placeholder="Utilizador ou Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="btn-main" id="btn-login">ENTRAR</button>
    <div id="login-error" style="color:red; font-size:11px; margin-top:10px; text-align:center;"></div>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="app-header">
    <div><strong>☢️ MeuTurno</strong></div>
    <div style="display:flex; align-items:center; gap:8px;">
        <div style="text-align:right; font-size:9px;"><span id="header-nome"></span><br><span id="admin-tag" class="hidden" style="color:#FFD700; font-weight:bold;">COORDENAÇÃO</span></div>
        <button id="btn-logout" class="btn-logout">Sair</button>
    </div>
  </div>

  <div id="tab-avisos" class="tab-content">
    <div class="section-title">📢 Quadro de Avisos</div>
    <button id="btn-novo-aviso" class="btn-main hidden" style="margin-bottom:15px; padding:10px;">+ Novo Aviso</button>
    <div id="lista-avisos"></div>
  </div>

  <div id="tab-tecnicos" class="tab-content hidden">
    <div class="section-title">📅 Horário Técnicos</div>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button id="btn-tec-atual" class="btn-main" style="flex:1; font-size:11px;">Mês Atual</button>
        <button id="btn-tec-prox" class="btn-main" style="flex:1; font-size:11px; background:white; color:var(--primary); border:1px solid var(--primary);">Próximo Mês</button>
    </div>
    <div class="viewer-card">
      <div class="viewer-actions">
        <a href="#" id="f-tec" class="btn-action" target="_blank">🔍 Tela Cheia</a>
        <a href="#" id="p-tec" class="btn-action" target="_blank">🖨️ Imprimir</a>
      </div>
      <div id="div-tec"></div>
    </div>
  </div>

  <div id="tab-medicos" class="tab-content hidden">
    <div class="section-title">🩺 Horário Médicos</div>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button id="btn-med-atual" class="btn-main" style="flex:1; font-size:11px;">Mês Atual</button>
        <button id="btn-med-prox" class="btn-main" style="flex:1; font-size:11px; background:white; color:var(--primary); border:1px solid var(--primary);">Próximo Mês</button>
    </div>
    <div class="viewer-card">
      <div class="viewer-actions">
        <a href="#" id="f-med" class="btn-action" target="_blank">🔍 Tela Cheia</a>
        <a href="#" id="p-med" class="btn-action" target="_blank">🖨️ Imprimir</a>
      </div>
      <div id="div-med"></div>
    </div>
  </div>

  <div id="tab-oncall" class="tab-content hidden">
    <div class="section-title">🚨 Oncall Anestesia</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="f-oncall" class="btn-action" target="_blank">🔍 Tela Cheia</a></div>
      <div id="div-oncall"></div>
    </div>
  </div>

  <div id="tab-telefones" class="tab-content hidden">
    <div class="section-title">📞 Lista Telefónica</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="f-tel" class="btn-action" target="_blank">🔍 Tela Cheia</a></div>
      <div id="div-telefones"></div>
    </div>
  </div>

  <div id="tab-pedidos" class="tab-content hidden">
    <div class="section-title">🔄 Pedir Troca</div>
    <div class="card" style="border-left-color: var(--secondary);">
        <label class="form-label">📅 O MEU TURNO:</label>
        <input type="date" id="p-meu-data">
        <input type="text" id="p-meu-periodo" placeholder="Ex: Manhã (8h-16h)">
        <label class="form-label">🔄 TURNO PRETENDIDO:</label>
        <input type="date" id="p-pret-data">
        <input type="text" id="p-pret-periodo" placeholder="Ex: Tarde (16h-00h)">
        <label class="form-label">👤 COLEGA (Mesmo Cargo):</label>
        <select id="p-colega-select"><option>A carregar colegas...</option></select>
        <label class="form-label">💬 MOTIVO:</label>
        <textarea id="p-motivo" placeholder="Opcional..."></textarea>
        <button class="btn-main" id="btn-enviar-pedido">Enviar Pedido</button>
        <div id="pedido-msg" style="text-align:center; margin-top:10px; font-size:12px;"></div>
    </div>
    <div id="meus-pedidos"></div>
  </div>

  <div id="tab-gestao" class="tab-content hidden">
    <div class="section-title">⚙️ Gestão de Pedidos</div>
    <div id="lista-gestao"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="avisos"><span class="icon">📢</span>Avisos</button>
    <button class="nav-btn" data-tab="tecnicos"><span class="icon">📅</span>Técnicos</button>
    <button class="nav-btn" data-tab="medicos"><span class="icon">🩺</span>Médicos</button>
    <button class="nav-btn" data-tab="oncall"><span class="icon">🚨</span>Oncall</button>
    <button class="nav-btn" data-tab="telefones"><span class="icon">📞</span>Lista</button>
    <button class="nav-btn" data-tab="pedidos"><span class="icon">🔄</span>Trocas</button>
    <button id="nav-gestao" class="nav-btn hidden" data-tab="gestao"><span class="icon">⚙️</span>Gestão</button>
  </nav>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, getDoc, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnQ5fQFmx1-48lJwcaJhSKq2Y8MAaNAcY",
    authDomain: "meuturno-d7d1a.firebaseapp.com",
    projectId: "meuturno-d7d1a",
    storageBucket: "meuturno-d7d1a.firebasestorage.app",
    messagingSenderId: "634840990788",
    appId: "1:634840990788:web:3b7b0e8d1d051959d86811"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const ADMINS = ["carlos.martins@alivasaude.com", "ana.baiao@alivasaude.com"];
  let currentUser = null, userRole = null, isAdmin = false, linksDB = {};

  // VISUALIZADOR PDF
  function setViewer(divId, fId, pId, rawUrl) {
    const wrapper = document.getElementById(divId);
    if (!rawUrl || !wrapper) return;
    let url = rawUrl.includes('<iframe') ? rawUrl.match(/src="([^"]+)"/)[1] : rawUrl.trim();
    if (url.includes("1drv.ms") && !url.includes("action=")) url += (url.includes("?") ? "&" : "?") + "action=embedview";
    
    if (fId) document.getElementById(fId).href = url.replace("action=embedview", "");
    if (pId) document.getElementById(pId).href = url.replace("action=embedview", "");
    wrapper.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      isAdmin = ADMINS.includes(user.email);
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("app-screen").classList.remove("hidden");
      document.getElementById("header-nome").textContent = user.email.split("@")[0];

      if (isAdmin) {
          document.getElementById("admin-tag").classList.remove("hidden");
          document.getElementById("btn-novo-aviso").classList.remove("hidden");
          document.getElementById("nav-gestao").classList.remove("hidden");
          carregarGestao();
      }

      const p = await getDoc(doc(db, "Utilizadores", user.uid));
      if (p.exists()) { userRole = p.data().role; carregarColegasRole(); }

      // LINKS DA links_v2
      onSnapshot(doc(db, "Config", "links_v2"), snap => {
        if (snap.exists()) {
          linksDB = snap.data();
          setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_atual);
          setViewer("div-med", "f-med", "p-med", linksDB.horario_medicos_atual);
          setViewer("div-oncall", "f-oncall", null, linksDB.oncall);
          setViewer("div-telefones", "f-tel", null, linksDB.telefones);
        }
      });

      carregarAvisos();
      carregarMeusPedidos();
    } else {
      document.getElementById("app-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
    }
  });

  // LOGICA AVISOS
  function carregarAvisos() {
    onSnapshot(query(collection(db, "Avisos"), orderBy("createdAt", "desc")), snap => {
        const div = document.getElementById("lista-avisos");
        div.innerHTML = "";
        snap.forEach(d => {
            const a = d.data();
            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `<strong>👤 ${a.autor}</strong><div class="aviso-texto">${a.texto}</div>
                <button onclick="window.confirmarLeitura('${d.id}')" style="font-size:10px; padding:4px 8px; border-radius:5px; border:1px solid var(--primary); cursor:pointer;">✅ Confirmar Leitura</button>
                ${isAdmin ? `<button onclick="window.apagarAviso('${d.id}')" style="margin-left:10px; border:none; background:none; cursor:pointer;">🗑️</button>` : ""}`;
            div.appendChild(card);
        });
    });
  }

  window.apagarAviso = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "Avisos", id)); };
  window.confirmarLeitura = async (id) => { 
      await setDoc(doc(db, "Avisos", id, "acknowledgements", currentUser.uid), { nome: currentUser.email, data: serverTimestamp() });
      alert("Confirmado!"); 
  };

  // LOGICA TROCAS
  async function carregarColegasRole() {
      const q = query(collection(db, "Utilizadores"), where("role", "==", userRole));
      const snap = await getDocs(q);
      const sel = document.getElementById("p-colega-select");
      sel.innerHTML = '<option value="">Selecionar Colega</option>';
      snap.forEach(d => {
          if (d.data().email !== currentUser.email) {
              const opt = document.createElement("option"); opt.value = d.data().email; opt.dataset.nome = d.data().nome; opt.textContent = d.data().nome;
              sel.appendChild(opt);
          }
      });
  }

  document.getElementById("btn-enviar-pedido").addEventListener("click", async () => {
      const meuTurno = document.getElementById("p-meu-data").value + " (" + document.getElementById("p-meu-periodo").value + ")";
      const pretTurno = document.getElementById("p-pret-data").value + " (" + document.getElementById("p-pret-periodo").value + ")";
      const colega = document.getElementById("p-colega-select");
      if(!colega.value) return;
      await addDoc(collection(db, "Pedidos"), {
          uid: currentUser.uid, nome: currentUser.email.split("@")[0], email: currentUser.email,
          meuTurno, turnoPretendido: pretTurno, colega_email: colega.value, colega_nome: colega.options[colega.selectedIndex].dataset.nome,
          status: "pendente", role: userRole, createdAt: serverTimestamp()
      });
      document.getElementById("pedido-msg").innerHTML = "✅ Enviado!";
  });

  function carregarMeusPedidos() {
    onSnapshot(query(collection(db, "Pedidos"), where("uid", "==", currentUser.uid), orderBy("createdAt", "desc")), snap => {
        const div = document.getElementById("meus-pedidos");
        div.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            div.innerHTML += `<div class="card">🔄 ${p.meuTurno} ➡️ ${p.turnoPretendido}<br><span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span></div>`;
        });
    });
  }

  function carregarGestao() {
    onSnapshot(query(collection(db, "Pedidos"), where("status", "==", "pendente")), snap => {
        const div = document.getElementById("lista-gestao");
        div.innerHTML = snap.empty ? "Sem pendentes." : "";
        snap.forEach(d => {
            const p = d.data();
            div.innerHTML += `<div class="card"><strong>${p.nome}</strong> (${p.role})<br>${p.meuTurno} ➡️ ${p.turnoPretendido}<br>
                <button onclick="window.decidir('${d.id}', 'aprovado')" style="color:green; border:none; background:none; cursor:pointer; font-weight:bold; margin-top:10px;">APROVAR</button> | 
                <button onclick="window.decidir('${d.id}', 'reprovado')" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold; margin-top:10px;">RECUSAR</button></div>`;
        });
    });
  }

  window.decidir = async (id, s) => { await updateDoc(doc(db, "Pedidos", id), { status: s }); };

  // NAV
  document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
      document.querySelectorAll(".nav-btn").forEach(n => n.classList.remove("active"));
      document.getElementById("tab-" + btn.dataset.tab).classList.remove("hidden");
      btn.classList.add("active");
  }));

  // TOGGLES MEDICOS/TECNICOS
  document.getElementById("btn-tec-atual").onclick = () => setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_atual);
  document.getElementById("btn-tec-prox").onclick = () => setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_proximo);
  document.getElementById("btn-med-atual").onclick = () => setViewer("div-med", "f-med", "p-med", linksDB.horario_medicos_atual);
  document.getElementById("btn-med-prox").onclick = () => setViewer("div-med", "f-med", "p-med", linksDB.horario_medicos_proximo);

  document.getElementById("btn-login").onclick = () => {
      const email = document.getElementById("login-email").value.trim() + (document.getElementById("login-email").value.includes("@") ? "" : "@imagiologia.local");
      signInWithEmailAndPassword(auth, email, document.getElementById("login-pass").value).catch(() => alert("Erro!"));
  };
  document.getElementById("btn-logout").onclick = () => signOut(auth);
</script>
</body>
</html>
