<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MeuTurno BETA v2.0</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2AA8A8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root { --primary: #2AA8A8; --secondary: #2D6E8E; --bg: #f0f4f7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
    .hidden { display: none !important; }
    
    /* LOGIN */
    #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
    .login-box { background: white; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .login-box input { width: 100%; padding: 13px; margin: 7px 0; border-radius: 10px; border: 1.5px solid #ddd; outline: none; }
    .btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    /* INTERFACE */
    .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .tab-content { padding: 12px; padding-bottom: 90px; }
    .section-title { font-size: 18px; font-weight: 700; color: var(--secondary); margin: 15px 0; }

    /* VISUALIZADOR PDF */
    .viewer-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .viewer-actions { display: flex; background: #f8f9fa; border-bottom: 1px solid #eee; }
    .btn-action { flex: 1; padding: 12px; text-align: center; text-decoration: none; color: var(--secondary); font-size: 11px; font-weight: 700; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 6px; }
    iframe { width: 100%; height: calc(100svh - 260px); min-height: 450px; border: none; display: block; background: #fff; }

    /* NAV FUNDO */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e0e0e0; z-index: 100; overflow-x: auto; }
    .nav-btn { flex: 1; min-width: 60px; padding: 8px 2px 6px; border: none; background: none; color: #999; font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn .icon { font-size: 22px; }

    /* CARDS */
    .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid var(--primary); }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-pendente { background: #fff3cd; color: #856404; }
    .status-aprovado { background: #d1e7dd; color: #0f5132; }
  </style>
</head>
<body>

<div id="login-screen">
  <div style="font-size: 64px; color:#FFD700; margin-bottom:10px;">☢</div>
  <h1 style="color:white;">MeuTurno BETA</h1>
  <div class="login-box">
    <input type="text" id="login-email" placeholder="Utilizador ou Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="btn-main" id="btn-login">Entrar</button>
    <div id="login-error" style="color:red; font-size:12px; margin-top:10px; text-align:center;"></div>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="app-header">
    <div><strong>☢ MeuTurno v2</strong></div>
    <button id="btn-logout" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 12px; border-radius:15px; font-size:11px;">Sair</button>
  </div>

  <div id="tab-tecnicos" class="tab-content">
    <div class="section-title">📅 Horário Técnicos</div>
    <div class="viewer-card">
      <div class="viewer-actions">
        <a href="#" id="f-tec" class="btn-action" target="_blank">🔍 Tela Cheia</a>
        <a href="#" id="p-tec" class="btn-action" target="_blank">🖨️ Imprimir</a>
      </div>
      <div id="div-tec"></div>
    </div>
  </div>

  <div id="tab-oncall" class="tab-content hidden">
    <div class="section-title">🚨 Oncall Anestesia</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="f-oncall" class="btn-action" target="_blank">🔍 Tela Cheia</a></div>
      <div id="div-oncall"></div>
    </div>
  </div>

  <div id="tab-pedidos" class="tab-content hidden">
    <div class="section-title">🔄 Pedir Troca</div>
    <div class="card">
        <label style="font-size:11px; font-weight:bold;">O MEU TURNO:</label>
        <input type="date" id="p-data" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="text" id="p-turno" placeholder="Ex: Manhã (8h-16h)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        
        <label style="font-size:11px; font-weight:bold;">COLEGA (Mesmo Cargo):</label>
        <select id="p-colega" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;"><option>A carregar...</option></select>
        
        <button class="btn-main" id="btn-enviar-pedido">Enviar Pedido</button>
        <div id="pedido-msg" style="text-align:center; margin-top:10px; font-size:12px;"></div>
    </div>
    <div class="section-title">📋 Meus Pedidos</div>
    <div id="meus-pedidos"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="tecnicos"><span class="icon">📅</span>Técnicos</button>
    <button class="nav-btn" data-tab="oncall"><span class="icon">🚨</span>Oncall</button>
    <button class="nav-btn" data-tab="pedidos"><span class="icon">🔄</span>Trocas</button>
  </nav>
</div>

<script>
  // CARREGAR EMAILJS
  (function(){
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
    s.onload = () => emailjs.init("POYtv2l_dgsbXbtFF");
    document.head.appendChild(s);
  })();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, getDoc, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnQ5fQFmx1-48lJwcaJhSKq2Y8MAaNAcY",
    authDomain: "meuturno-d7d1a.firebaseapp.com",
    projectId: "meuturno-d7d1a",
    storageBucket: "meuturno-d7d1a.firebasestorage.app",
    messagingSenderId: "634840990788",
    appId: "1:634840990788:web:3b7b0e8d1d051959d86811"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const messaging = getMessaging(app);
  const API_BASE = "https://meuturno-notifications.onrender.com";

  let currentUser = null, userRole = null;

  // NOTIFICAÇÕES
  async function enviarNotificacao(payload) {
    try { await fetch(`${API_BASE}/pedido`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); } catch (e) {}
  }

  // VISUALIZADOR PDF
  function setViewer(divId, fId, pId, rawUrl) {
    const wrapper = document.getElementById(divId);
    if (!rawUrl || !wrapper) return;
    let url = rawUrl.includes('<iframe') ? rawUrl.match(/src="([^"]+)"/)[1] : rawUrl.trim();
    if (url.includes("/b/c/")) url += (url.includes("?") ? "&" : "?") + "action=embedview";
    
    if (fId) document.getElementById(fId).href = url.replace("action=embedview", "");
    if (pId) document.getElementById(pId).href = url.replace("action=embedview", "");
    wrapper.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("app-screen").classList.remove("hidden");

      // Obter Role do Utilizador
      const p = await getDoc(doc(db, "Utilizadores", user.uid));
      if (p.exists()) {
          userRole = p.data().role;
          carregarColegasRole();
      }

      // Escutar Horários
      onSnapshot(doc(db, "Config", "links"), snap => {
        if (snap.exists()) {
          const l = snap.data();
          setViewer("div-tec", "f-tec", "p-tec", l.horario_tecnicos_atual);
          setViewer("div-oncall", "f-oncall", null, l.oncall);
        }
      });

      carregarMeusPedidos();
    } else {
      document.getElementById("app-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
    }
  });

  // CARREGAR COLEGAS (REGRA DE ROLE)
  async function carregarColegasRole() {
      const q = query(collection(db, "Utilizadores"), where("role", "==", userRole));
      const snap = await getDocs(q);
      const sel = document.getElementById("p-colega");
      sel.innerHTML = '<option value="">Selecionar Colega</option>';
      snap.forEach(d => {
          if (d.data().email !== currentUser.email) {
              sel.innerHTML += `<option value="${d.data().email}" data-nome="${d.data().nome}">${d.data().nome || d.data().email}</option>`;
          }
      });
  }

  // ENVIAR PEDIDO (EMAILJS + FIREBASE + NOTIFICAÇÃO)
  document.getElementById("btn-enviar-pedido").addEventListener("click", async () => {
    const msg = document.getElementById("pedido-msg");
    const colegaSel = document.getElementById("p-colega");
    const meuTurno = document.getElementById("p-data").value + " (" + document.getElementById("p-turno").value + ")";
    
    if(!colegaSel.value || !document.getElementById("p-data").value) {
        msg.innerHTML = "❌ Preencha todos os campos.";
        return;
    }

    msg.innerHTML = "⏳ A enviar...";

    try {
        const docRef = await addDoc(collection(db, "Pedidos"), {
            email: currentUser.email,
            nome: currentUser.email.split("@")[0],
            meuTurno,
            colega_email: colegaSel.value,
            colega_nome: colegaSel.options[colegaSel.selectedIndex].dataset.nome,
            status: "pendente",
            createdAt: serverTimestamp(),
            role: userRole
        });

        // EmailJS
        await emailjs.send("service_ypyd6nc", "template_r12r1qi", {
            from_name: currentUser.email,
            meu_turno: meuTurno,
            colega: colegaSel.options[colegaSel.selectedIndex].dataset.nome,
            pedido_id: docRef.id
        });

        // Notificação Push via Render
        await enviarNotificacao({
            nome: currentUser.email.split("@")[0],
            colega_nome: colegaSel.options[colegaSel.selectedIndex].dataset.nome,
            colega_email: colegaSel.value
        });

        msg.style.color = "green";
        msg.innerHTML = "✅ Pedido enviado com sucesso!";
    } catch(e) {
        msg.style.color = "red";
        msg.innerHTML = "❌ Erro ao enviar.";
    }
  });

  function carregarMeusPedidos() {
    onSnapshot(query(collection(db, "Pedidos"), where("email", "==", currentUser.email)), snap => {
        const div = document.getElementById("meus-pedidos");
        div.innerHTML = snap.empty ? "<p style='font-size:12px; color:#aaa;'>Sem pedidos.</p>" : "";
        snap.forEach(d => {
            const p = d.data();
            div.innerHTML += `<div class="card">Troca de ${p.meuTurno}<br><span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span></div>`;
        });
    });
  }

  // LOGIN E NAVEGAÇÃO
  document.getElementById("btn-login").addEventListener("click", async () => {
    const u = document.getElementById("login-email").value.trim();
    const email = u.includes("@") ? u : u + "@imagiologia.local";
    try { await signInWithEmailAndPassword(auth, email, document.getElementById("login-pass").value); }
    catch(e) { document.getElementById("login-error").textContent = "Erro no acesso."; }
  });

  document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));

  document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
      document.querySelectorAll(".nav-btn").forEach(n => n.classList.remove("active"));
      document.getElementById("tab-" + btn.dataset.tab).classList.remove("hidden");
      btn.classList.add("active");
  }));
</script>
</body>
</html>
