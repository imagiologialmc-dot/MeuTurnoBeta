<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MeuTurno v2.0</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2AA8A8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-512.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap" rel="stylesheet">

  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>

  <style>
    :root { 
      --primary: #2AA8A8; 
      --secondary: #2D6E8E; 
      --bg: #f0f4f7; 
      --surface: #ffffff; 
      --text-main: #333333;
      --text-muted: #666666;
      --border: #dddddd;
      --card-shadow: 0 1px 6px rgba(0,0,0,0.07);
      --nav-active: #2AA8A8;
      --login-grad-1: #2AA8A8;
      --login-grad-2: #2D6E8E;
    }

    :root.dark-mode {
      --bg: #202124;         
      --surface: #292A2D;    
      --text-main: #E8EAED;  
      --text-muted: #9AA0A6; 
      --border: #3C4043;     
      --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
      --nav-active: #4DD0E1; 
      --login-grad-1: #163838; 
      --login-grad-2: #142833;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease; }
    .hidden { display: none !important; }
    .brand-text { font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: -0.5px; }
    
    #login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; background: linear-gradient(135deg, var(--login-grad-1) 0%, var(--login-grad-2) 100%); overflow: hidden; transition: background 0.3s ease; }
    .logo-anim-container { position: relative; width: 280px; height: 150px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
    .logo-clinic { position: absolute; width: 240px; height: auto; object-fit: contain; animation: clinicPulse 3.5s forwards; }
    .logo-app { position: absolute; width: 130px; height: 130px; border-radius: 32px; object-fit: cover; box-shadow: 0 15px 35px rgba(0,0,0,0.3); opacity: 0; animation: appFadeIn 3.5s forwards; }
    
    @keyframes clinicPulse { 0% { opacity: 0; transform: scale(0.9); } 15% { opacity: 1; transform: scale(1); } 35% { opacity: 1; transform: scale(1.05); } 60% { opacity: 1; transform: scale(1.05); } 80% { opacity: 0; transform: scale(0.9); } 100% { opacity: 0; transform: scale(0.9); visibility: hidden; } }
    @keyframes appFadeIn { 0% { opacity: 0; transform: scale(0.5); } 75% { opacity: 0; transform: scale(0.5); } 90% { opacity: 1; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
    
    .login-form-container { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; opacity: 0; animation: formEntry 1s forwards 2.8s; }
    @keyframes formEntry { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    
    .login-box { background: var(--surface); border-radius: 20px; padding: 30px 25px; width: 100%; box-shadow: var(--card-shadow); text-align: center; transition: background 0.3s; border: 1px solid var(--border); }
    .login-box input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1.5px solid var(--border); outline: none; text-align: left; font-size: 15px; background: var(--bg); color: var(--text-main); transition: 0.3s; }
    .login-box input:focus { border-color: var(--primary); }
    
    .btn-main { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 15px; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-main:disabled { background: #888; cursor: not-allowed; opacity: 0.7; }
    #btn-forgot { margin-top: 15px; font-size: 13px; color: rgba(255,255,255,0.9); text-decoration: underline; cursor: pointer; display: inline-block; }

    .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }

    .tab-content { padding: 12px; padding-bottom: 90px; }
    .section-title { font-size: 18px; font-weight: 700; color: var(--primary); margin: 15px 0; display: flex; align-items: center; gap: 8px; }

    .card { background: var(--surface); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: var(--card-shadow); border-left: 4px solid var(--primary); text-align: left; transition: background 0.3s; }
    
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); display: flex; border-top: 1px solid var(--border); z-index: 100; overflow-x: auto; padding-bottom: env(safe-area-inset-bottom); transition: background 0.3s; }
    .nav-btn { flex: 1; min-width: 62px; padding: 10px 2px 8px 2px; border: none; background: none; color: var(--text-muted); font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: color 0.2s; }
    .nav-btn .icon { font-size: 24px; transition: transform 0.2s; font-variation-settings: 'FILL' 0; }
    .nav-btn.active { color: var(--nav-active); font-weight: 700; }
    .nav-btn.active .icon { font-variation-settings: 'FILL' 1; transform: scale(1.1); }

    .viewer-card { background: var(--surface); border-radius: 12px; overflow: hidden; box-shadow: var(--card-shadow); margin-bottom: 16px; border: 1px solid var(--border); transition: background 0.3s; }
    .viewer-actions { display: flex; background: var(--bg); border-bottom: 1px solid var(--border); transition: background 0.3s; }
    .btn-action { flex: 1; padding: 14px; text-align: center; text-decoration: none; color: var(--primary); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: background 0.2s; }
    iframe { width: 100%; height: calc(100svh - 270px); min-height: 400px; border: none; display: block; background: #fff; }

    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="logo-anim-container">
    <img src="Hlogo.png" class="logo-clinic" onerror="this.style.display='none'" alt="Símbolo Clínica">
    <img src="icon-512.png" class="logo-app" onerror="this.style.display='none'" alt="Símbolo App">
  </div>

  <div class="login-form-container">
    <h1 class="brand-text" style="color:white; font-size:34px; margin-bottom:0px;">MeuTurno</h1>
    <p style="color:rgba(255,255,255,0.8); font-size:14px; margin-bottom:25px; letter-spacing: 1px;">v2.0</p>
    <div class="login-box">
      <input type="text" id="login-email" placeholder="Utilizador ou Email">
      <input type="password" id="login-pass" placeholder="Password">
      <button class="btn-main" id="btn-login"><span class="material-symbols-rounded">login</span> ENTRAR</button>
      <div id="login-error" style="color:#e74c3c; font-size:12px; margin-top:12px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:4px;"></div>
    </div>
    <a id="btn-forgot">Esqueci-me da password</a>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="app-header">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="icon-512.png" style="width: 28px; height: 28px; border-radius: 7px; object-fit: cover;">
        <strong class="brand-text" style="font-size:19px;">MeuTurno</strong>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
        <span id="theme-toggle" class="material-symbols-rounded" style="cursor:pointer; font-size:22px;">dark_mode</span>
        <div style="text-align:right; font-size:9px; line-height: 1.2;">
            <span id="header-nome"></span><br>
            <span id="admin-tag" class="hidden" style="color:#FFD700; font-weight:bold;">COORDENAÇÃO</span>
        </div>
        <button id="btn-logout" class="btn-logout">Sair</button>
    </div>
  </div>

  <div id="tab-avisos" class="tab-content">
    <div class="section-title"><span class="material-symbols-rounded">campaign</span> Quadro de Avisos</div>
    <div id="lista-avisos"></div>
  </div>

  <div id="tab-tecnicos" class="tab-content hidden">
    <div class="section-title"><span class="material-symbols-rounded">calendar_month</span> Horário Técnicos</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="dl-tec" class="btn-action" target="_blank"><span class="material-symbols-rounded">download</span> Download</a></div>
      <div id="div-tec"></div>
    </div>
  </div>

  <div id="tab-medicos" class="tab-content hidden">
    <div class="section-title"><span class="material-symbols-rounded">stethoscope</span> Horário Médicos</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="dl-med" class="btn-action" target="_blank"><span class="material-symbols-rounded">download</span> Download</a></div>
      <div id="div-med"></div>
    </div>
  </div>

  <div id="tab-formularios" class="tab-content hidden">
    <div class="section-title"><span class="material-symbols-rounded">folder_open</span> Formulários QCI</div>
    <div id="lista-formularios"><div class="empty-state">A carregar formulários...</div></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="avisos"><span class="material-symbols-rounded icon">campaign</span>Avisos</button>
    <button class="nav-btn" data-tab="tecnicos"><span class="material-symbols-rounded icon">calendar_month</span>Técnicos</button>
    <button class="nav-btn" data-tab="medicos"><span class="material-symbols-rounded icon">stethoscope</span>Médicos</button>
    <button class="nav-btn" data-tab="formularios"><span class="material-symbols-rounded icon">folder_open</span>QCI</button>
  </nav>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, collection, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnQ5fQFmx1-48lJwcaJhSKq2Y8MAaNAcY",
    authDomain: "meuturno-d7d1a.firebaseapp.com",
    projectId: "meuturno-d7d1a",
    storageBucket: "meuturno-d7d1a.firebasestorage.app",
    messagingSenderId: "634840990788",
    appId: "1:634840990788:web:3b7b0e8d1d051959d86811"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function formatarNomeQCI(key) {
      let raw = key.replace(/^(qci)[_\s]*/i, '').replace(/_/g, " ");
      const siglas = ['RM', 'TC', 'MM', 'BAAF', 'QCI'];
      const ligacoes = ['de', 'da', 'do', 'por', 'e', 'ou'];
      return raw.split(' ').map((word, index) => {
          let u = word.toUpperCase();
          if(siglas.includes(u)) return u;
          if(ligacoes.includes(word.toLowerCase()) && index !== 0) return word.toLowerCase();
          return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
      }).join(' ');
  }

  function handleForcedDownload(rawUrl, fileName) {
      let url = rawUrl;
      // Extrair link se estiver dentro de um iframe
      if (url.includes('src=')) {
          const match = url.match(/src=["']([^"']+)["']/);
          if (match) url = match[1];
      }
      url = url.trim().replace(/^["']/, '').split(/["'\s]/)[0];
      
      // Conversão OneDrive para Download Direto
      if(url.includes("onedrive.live.com/embed") || url.includes("1drv.ms")) {
          url = url.replace("/embed", "/download").replace("/view", "/download");
          if(!url.includes("?")) url += "?download=1";
          else if(!url.includes("download=1")) url += "&download=1";
      }

      const a = document.createElement('a');
      a.href = url;
      a.download = fileName + ".pdf";
      a.target = "_blank"; // Backup
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("app-screen").classList.remove("hidden");
      document.getElementById("header-nome").textContent = user.email.split("@")[0];

      onSnapshot(doc(db, "Config", "links_v2"), snap => {
        if (snap.exists()) {
          const links = snap.data();
          const formsDiv = document.getElementById("lista-formularios");
          formsDiv.innerHTML = "";
          
          Object.keys(links).sort().forEach(key => {
              if (key.toLowerCase().startsWith("qci")) {
                  const name = formatarNomeQCI(key);
                  const card = document.createElement("div");
                  card.className = "card";
                  card.style.display = "flex"; card.style.justifyContent = "space-between"; card.style.alignItems = "center";
                  card.innerHTML = `<div><strong>${name}</strong></div>
                      <button class="btn-main" style="margin:0; width:auto; padding:8px 15px; font-size:12px;">📥 Download para Imprimir</button>`;
                  card.querySelector('button').onclick = () => handleForcedDownload(links[key], name);
                  formsDiv.appendChild(card);
              }
          });
        }
      });
    } else {
      document.getElementById("app-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
    }
  });

  document.getElementById("btn-login").onclick = async () => {
    const u = document.getElementById("login-email").value;
    const p = document.getElementById("login-pass").value;
    try { await signInWithEmailAndPassword(auth, u.includes("@") ? u : u + "@imagiologia.local", p); } 
    catch(e) { document.getElementById("login-error").innerText = "Erro no login."; }
  };

  document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
          document.querySelectorAll(".nav-btn").forEach(n => n.classList.remove("active"));
          document.getElementById("tab-" + btn.dataset.tab).classList.remove("hidden");
          btn.classList.add("active");
      });
  });

  document.getElementById("btn-logout").onclick = () => signOut(auth).then(() => window.location.reload());
</script>
</body>
</html>
