<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MeuTurno BETA v2.0</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2AA8A8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root { --primary: #2AA8A8; --secondary: #2D6E8E; --bg: #f0f4f7; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
    .hidden { display: none !important; }
    
    /* LOGIN */
    #login-screen, #change-pass-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); }
    .logo { font-size: 64px; color: #FFD700; margin-bottom: 10px; }
    .login-box { background: white; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .login-box input { width: 100%; padding: 13px; margin: 7px 0; border-radius: 10px; border: 1.5px solid #ddd; outline: none; }
    .btn-main { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }

    /* HEADER */
    .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .btn-logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; }

    /* VISUALIZADOR DE HORÁRIOS */
    .viewer-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 16px; }
    .viewer-actions { display: flex; background: #f8f9fa; border-bottom: 1px solid #eee; }
    .btn-action { flex: 1; padding: 12px; text-align: center; text-decoration: none; color: var(--secondary); font-size: 11px; font-weight: 700; border-right: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-action:last-child { border-right: none; }
    iframe { width: 100%; height: calc(100svh - 260px); min-height: 450px; border: none; display: block; background: #fff; }

    /* TABS E NAVEGAÇÃO */
    .tab-content { padding: 12px; padding-bottom: 90px; }
    .section-title { font-size: 18px; font-weight: 700; color: var(--secondary); margin: 15px 0; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e0e0e0; z-index: 100; overflow-x: auto; }
    .nav-btn { flex: 1; min-width: 55px; padding: 8px 2px 6px; border: none; background: none; color: #999; font-size: 9px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn .icon { font-size: 22px; }

    /* CARDS (AVISOS / PEDIDOS) */
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid var(--primary); }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-pendente { background: #fff3cd; color: #856404; }
    .status-aprovado { background: #d1e7dd; color: #0f5132; }
    .status-reprovado { background: #f8d7da; color: #842029; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="logo">☢</div>
  <h1 style="color:white; font-size:28px;">MeuTurno BETA</h1>
  <p style="color:rgba(255,255,255,0.8); margin-bottom:30px;">Versão 2.0 - Amb. Testes</p>
  <div class="login-box">
    <input type="text" id="login-email" placeholder="Utilizador ou Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="btn-main" id="btn-login">Entrar</button>
    <div id="login-error"></div>
    <button type="button" id="btn-reset" style="background:none; border:none; color:var(--primary); font-size:12px; margin-top:10px; width:100%;">Esqueceste a password?</button>
  </div>
</div>

<div id="app-screen" class="hidden">
  <div class="app-header">
    <div><strong>☢ MeuTurno</strong></div>
    <div style="display:flex; align-items:center; gap:8px;">
        <span id="header-nome" style="font-size:10px;"></span>
        <button id="btn-logout" class="btn-logout">Sair</button>
    </div>
  </div>

  <div id="tab-avisos" class="tab-content">
    <div class="section-title">📢 Quadro de Avisos</div>
    <button id="btn-novo-aviso" class="btn-main hidden" style="margin-bottom:15px; padding:10px;">+ Novo Aviso</button>
    <div id="lista-avisos"></div>
  </div>

  <div id="tab-tecnicos" class="tab-content hidden">
    <div class="section-title">📅 Horário Técnicos</div>
    <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button id="btn-tec-atual" class="btn-main" style="flex:1; font-size:12px;">Mês Atual</button>
        <button id="btn-tec-prox" class="btn-main" style="flex:1; font-size:12px; background:white; color:var(--primary); border:1px solid var(--primary);">Próximo Mês</button>
    </div>
    <div class="viewer-card">
      <div class="viewer-actions">
        <a href="#" id="f-tec" class="btn-action" target="_blank">🔍 Tela Cheia</a>
        <a href="#" id="p-tec" class="btn-action" target="_blank">🖨️ Imprimir</a>
      </div>
      <div id="div-tec"></div>
    </div>
  </div>

  <div id="tab-medicos" class="tab-content hidden">
    <div class="section-title">🩺 Horário Médicos</div>
    <div class="viewer-card">
      <div class="viewer-actions">
        <a href="#" id="f-med" class="btn-action" target="_blank">🔍 Tela Cheia</a>
        <a href="#" id="p-med" class="btn-action" target="_blank">🖨️ Imprimir</a>
      </div>
      <div id="div-med"></div>
    </div>
  </div>

  <div id="tab-oncall" class="tab-content hidden">
    <div class="section-title">🚨 Oncall Anestesia</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="f-oncall" class="btn-action" target="_blank">🔍 Tela Cheia</a></div>
      <div id="div-oncall"></div>
    </div>
  </div>

  <div id="tab-telefones" class="tab-content hidden">
    <div class="section-title">📞 Contactos Úteis</div>
    <div class="viewer-card">
      <div class="viewer-actions"><a href="#" id="f-tel" class="btn-action" target="_blank">🔍 Tela Cheia</a></div>
      <div id="div-tel"></div>
    </div>
  </div>

  <div id="tab-pedidos" class="tab-content hidden">
    <div class="section-title">🔄 Pedir Troca</div>
    <div class="card" style="border-left-color: var(--secondary);">
        <label style="font-size:11px; font-weight:bold;">O MEU TURNO:</label>
        <input type="date" id="p-data" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="p-turno" placeholder="Ex: Manhã (8h-16h)" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        
        <label style="font-size:11px; font-weight:bold;">COLEGA (Mesmo Cargo):</label>
        <select id="p-colega" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;"><option>A carregar colegas...</option></select>
        
        <label style="font-size:11px; font-weight:bold;">TURNO PRETENDIDO:</label>
        <input type="date" id="p-data-pret" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        
        <button class="btn-main" id="btn-enviar-pedido">Enviar Pedido de Troca</button>
        <div id="pedido-msg" style="text-align:center; margin-top:10px; font-size:12px;"></div>
    </div>
    <div class="section-title">📋 Meus Pedidos</div>
    <div id="meus-pedidos"></div>
  </div>

  <div id="tab-gestao" class="tab-content hidden">
    <div class="section-title">⚙️ Gestão de Trocas</div>
    <div id="lista-gestao"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="avisos"><span class="icon">📢</span>Avisos</button>
    <button class="nav-btn" data-tab="tecnicos"><span class="icon">📅</span>Técnicos</button>
    <button class="nav-btn" data-tab="medicos"><span class="icon">🩺</span>Médicos</button>
    <button class="nav-btn" data-tab="oncall"><span class="icon">🚨</span>Oncall</button>
    <button class="nav-btn" data-tab="telefones"><span class="icon">📞</span>Lista</button>
    <button class="nav-btn" data-tab="pedidos"><span class="icon">🔄</span>Trocas</button>
    <button class="nav-btn hidden" id="nav-gestao" data-tab="gestao"><span class="icon">⚙️</span>Gestão</button>
  </nav>
</div>

<div id="modal-aviso" class="modal-overlay hidden">
  <div class="login-box" style="max-width:400px;">
    <h3>Novo Aviso</h3>
    <textarea id="aviso-texto" style="width:100%; height:120px; margin:15px 0; padding:10px; border-radius:10px; border:1px solid #ddd; resize:none;"></textarea>
    <div style="display:flex; gap:10px;">
        <button onclick="document.getElementById('modal-aviso').classList.add('hidden')" style="flex:1; padding:12px; border-radius:10px; border:none; background:#eee;">Cancelar</button>
        <button id="btn-publicar" class="btn-main" style="flex:1; margin:0;">Publicar</button>
    </div>
  </div>
</div>

<script>
  (function(){
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";
    s.onload = () => emailjs.init("POYtv2l_dgsbXbtFF");
    document.head.appendChild(s);
  })();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, orderBy, getDoc, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDnQ5fQFmx1-48lJwcaJhSKq2Y8MAaNAcY",
    authDomain: "meuturno-d7d1a.firebaseapp.com",
    projectId: "meuturno-d7d1a",
    storageBucket: "meuturno-d7d1a.firebasestorage.app",
    messagingSenderId: "634840990788",
    appId: "1:634840990788:web:3b7b0e8d1d051959d86811"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const messaging = getMessaging(app);
  const ADMINS = ["carlos.martins@alivasaude.com", "ana.baiao@alivasaude.com"];
  const API_BASE = "https://meuturno-notifications.onrender.com";

  let currentUser = null, userRole = null, linksDB = {};

  // --- FUNÇÃO DE VISUALIZAÇÃO DE PDFs ---
  function setViewer(divId, fId, pId, rawUrl) {
    const wrapper = document.getElementById(divId);
    if (!rawUrl || !wrapper) return;
    
    // Limpa link (remove tags iframe se houver)
    let url = rawUrl.includes('<iframe') ? rawUrl.match(/src="([^"]+)"/)[1] : rawUrl.trim();
    
    // Configura para Visualização OneDrive
    if (url.includes("1drv.ms")) {
        if (!url.includes("action=")) url += (url.includes("?") ? "&" : "?") + "action=embedview";
    }

    if (fId) document.getElementById(fId).href = url.replace("action=embedview", "");
    if (pId) document.getElementById(pId).href = url.replace("action=embedview", "");
    wrapper.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
  }

  // --- LÓGICA DE INICIALIZAÇÃO ---
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("app-screen").classList.remove("hidden");
      document.getElementById("header-nome").textContent = user.email.split("@")[0];

      // Verificar Role e Admin
      const p = await getDoc(doc(db, "Utilizadores", user.uid));
      if (p.exists()) {
          userRole = p.data().role;
          carregarColegasRole();
      }

      if (ADMINS.includes(user.email)) {
          document.getElementById("nav-gestao").classList.remove("hidden");
          document.getElementById("btn-novo-aviso").classList.remove("hidden");
          carregarGestao();
      }

      // LEMOS DO links_v2 PARA O BETA
      onSnapshot(doc(db, "Config", "links_v2"), snap => {
        if (snap.exists()) {
          linksDB = snap.data();
          setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_atual);
          setViewer("div-med", "f-med", "p-med", linksDB.horario_medicos_atual);
          setViewer("div-oncall", "f-oncall", null, linksDB.oncall);
          setViewer("div-tel", "f-tel", null, linksDB.telefones);
        }
      });

      carregarAvisos();
      carregarMeusPedidos();
    } else {
      document.getElementById("app-screen").classList.add("hidden");
      document.getElementById("login-screen").classList.remove("hidden");
    }
  });

  // --- NOTIFICAÇÕES (RENDER) ---
  async function notificar(endpoint, payload) {
    try { await fetch(`${API_BASE}/${endpoint}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) }); } catch (e) {}
  }

  // --- CARREGAR COLEGAS (MESMO ROLE) ---
  async function carregarColegasRole() {
      const q = query(collection(db, "Utilizadores"), where("role", "==", userRole));
      const snap = await getDocs(q);
      const sel = document.getElementById("p-colega");
      sel.innerHTML = '<option value="">Selecionar Colega</option>';
      snap.forEach(d => {
          if (d.data().email !== currentUser.email) {
              sel.innerHTML += `<option value="${d.data().email}" data-nome="${d.data().nome}">${d.data().nome || d.data().email}</option>`;
          }
      });
  }

  // --- AVISOS ---
  function carregarAvisos() {
    onSnapshot(query(collection(db, "Avisos"), orderBy("createdAt", "desc")), snap => {
        const div = document.getElementById("lista-avisos");
        div.innerHTML = snap.empty ? '<div class="empty-msg">Sem avisos.</div>' : "";
        snap.forEach(d => {
            const a = d.data();
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<strong>👤 ${a.autor}</strong><p style="margin:8px 0; font-size:14px;">${a.texto}</p>
                             <button onclick="window.confirmarLeitura('${d.id}')" style="font-size:11px; padding:5px; border-radius:5px; border:1px solid var(--primary); cursor:pointer;">✅ Confirmar Leitura</button>
                             ${ADMINS.includes(currentUser.email) ? `<button onclick="window.apagarAviso('${d.id}')" style="margin-left:10px; border:none; background:none; cursor:pointer;">🗑️</button>` : ""}`;
            div.appendChild(card);
        });
    });
  }

  window.apagarAviso = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "Avisos", id)); };
  window.confirmarLeitura = async (id) => { 
      await setDoc(doc(db, "Avisos", id, "acknowledgements", currentUser.uid), { nome: currentUser.email, data: serverTimestamp() });
      alert("Confirmado!");
  };

  document.getElementById("btn-novo-aviso").addEventListener("click", () => document.getElementById("modal-aviso").classList.remove("hidden"));
  document.getElementById("btn-publicar").addEventListener("click", async () => {
      const texto = document.getElementById("aviso-texto").value;
      if(!texto) return;
      await addDoc(collection(db, "Avisos"), { texto, autor: currentUser.email.split("@")[0], createdAt: serverTimestamp() });
      await notificar("aviso", { titulo: "Novo Aviso", texto });
      document.getElementById("modal-aviso").classList.add("hidden");
      document.getElementById("aviso-texto").value = "";
  });

  // --- PEDIDOS DE TROCA ---
  document.getElementById("btn-enviar-pedido").addEventListener("click", async () => {
      const msg = document.getElementById("pedido-msg");
      const colegaSel = document.getElementById("p-colega");
      const meuTurno = document.getElementById("p-data").value + " (" + document.getElementById("p-turno").value + ")";
      
      if(!colegaSel.value || !document.getElementById("p-data").value) { msg.innerHTML = "Preencha tudo."; return; }
      msg.innerHTML = "⏳ A enviar...";

      try {
          const docRef = await addDoc(collection(db, "Pedidos"), {
              email: currentUser.email, nome: currentUser.email.split("@")[0],
              meuTurno, colega_email: colegaSel.value, colega_nome: colegaSel.options[colegaSel.selectedIndex].dataset.nome,
              status: "pendente", createdAt: serverTimestamp(), role: userRole
          });

          await emailjs.send("service_ypyd6nc", "template_r12r1qi", { from_name: currentUser.email, meu_turno: meuTurno, pedido_id: docRef.id });
          await notificar("pedido", { nome: currentUser.email.split("@")[0], colega_email: colegaSel.value });

          msg.innerHTML = "<span style='color:green'>✅ Enviado!</span>";
      } catch(e) { msg.innerHTML = "❌ Erro."; }
  });

  function carregarMeusPedidos() {
    onSnapshot(query(collection(db, "Pedidos"), where("email", "==", currentUser.email)), snap => {
        const div = document.getElementById("meus-pedidos");
        div.innerHTML = "";
        snap.forEach(d => {
            const p = d.data();
            div.innerHTML += `<div class="card">Troca: ${p.meuTurno} <span class="status-badge status-${p.status}">${p.status.toUpperCase()}</span></div>`;
        });
    });
  }

  function carregarGestao() {
    onSnapshot(query(collection(db, "Pedidos"), where("status", "==", "pendente")), snap => {
        const div = document.getElementById("lista-gestao");
        div.innerHTML = snap.empty ? "Sem pendentes." : "";
        snap.forEach(d => {
            const p = d.data();
            const card = document.createElement("div"); card.className = "card";
            card.innerHTML = `<strong>${p.nome}</strong> (${p.role}) quer trocar ${p.meuTurno}<br>
                             <button onclick="window.decidir('${d.id}', 'aprovado')" style="color:green; font-weight:bold; margin-top:10px; background:none; border:none; cursor:pointer;">APROVAR</button> | 
                             <button onclick="window.decidir('${d.id}', 'reprovado')" style="color:red; font-weight:bold; background:none; border:none; cursor:pointer;">REPROVAR</button>`;
            div.appendChild(card);
        });
    });
  }

  window.decidir = async (id, s) => { 
      await updateDoc(doc(db, "Pedidos", id), { status: s });
      const p = await getDoc(doc(db, "Pedidos", id));
      await notificar("status", { email: p.data().email, status: s });
  };

  // --- LOGIN E NAVEGAÇÃO ---
  document.getElementById("btn-login").addEventListener("click", async () => {
    const u = document.getElementById("login-email").value.trim();
    const p = document.getElementById("login-pass").value;
    const email = u.includes("@") ? u : u + "@imagiologia.local";
    try { await signInWithEmailAndPassword(auth, email, p); } catch(e) { document.getElementById("login-error").textContent = "Erro no acesso."; }
  });

  document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));
  document.getElementById("btn-reset").addEventListener("click", async () => {
      const email = document.getElementById("login-email").value.trim();
      if(email) await sendPasswordResetEmail(auth, email.includes("@") ? email : email + "@imagiologia.local");
      alert("Email de recuperação enviado.");
  });

  document.querySelectorAll(".nav-btn").forEach(btn => btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
      document.querySelectorAll(".nav-btn").forEach(n => n.classList.remove("active"));
      document.getElementById("tab-" + btn.dataset.tab).classList.remove("hidden");
      btn.classList.add("active");
  }));

  document.getElementById("tec-atual-btn").addEventListener("click", () => {
      document.getElementById("tec-atual-btn").style.background = "var(--primary)"; document.getElementById("tec-atual-btn").style.color = "white";
      document.getElementById("tec-prox-btn").style.background = "white"; document.getElementById("tec-prox-btn").style.color = "var(--primary)";
      setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_atual);
  });
  document.getElementById("tec-prox-btn").addEventListener("click", () => {
      document.getElementById("tec-prox-btn").style.background = "var(--primary)"; document.getElementById("tec-prox-btn").style.color = "white";
      document.getElementById("tec-atual-btn").style.background = "white"; document.getElementById("tec-atual-btn").style.color = "var(--primary)";
      setViewer("div-tec", "f-tec", "p-tec", linksDB.horario_tecnicos_proximo);
  });

</script>
</body>
</html>
